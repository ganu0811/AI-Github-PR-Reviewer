apiVersion: autoscaling/v2
kind: HorizontalPodAutoScaler
metadata:
  name: orchestrator-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Depolyment
    name: orchestrator
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resources
      resource:
        name: cpu
        target:
          type: Utilisation
          averageUtilities: 70
          